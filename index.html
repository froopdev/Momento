<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ihr Lollis</title>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.75);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-primary);
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin-top: 0.75rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        footer {
            position: fixed;
            bottom: 20px;
            right: 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.6rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            footer {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <main class="container">
        <h1>Ihr Lollis</h1>
        <div class="subtitle">For real For Real</div>
    </main>

    <footer>
        Owned & Operated by Benedikt Wellers
    </footer>

</body>
</html>
